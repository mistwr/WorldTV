<!DOCTYPE html>
<html lang="pt">

<meta charset="UTF-8">

<title>WORLD TV — Live Channels</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
:root{
  --bg:#06090f;--s1:#0b1120;--s2:#0f1829;--card:#111827;
  --border:#1e2d45;--border2:#243552;
  --accent:#3b82f6;--accent2:#60a5fa;
  --live:#ef4444;--green:#22c55e;
  --text:#f0f4ff;--sub:#94a3b8;--muted:#475569;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{flex-shrink:0;height:52px;background:rgba(6,9,15,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:200;}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;letter-spacing:-.5px;white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--accent2);}
.vline{width:1px;height:24px;background:var(--border);flex-shrink:0;}
#countryBtn{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:6px 11px;cursor:pointer;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .15s;max-width:190px;min-width:0;flex-shrink:0;}
#countryBtn:hover{border-color:var(--accent);background:var(--s2);}
#cflag{font-size:16px;flex-shrink:0;}
#cname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#srchWrap{flex:1;position:relative;min-width:0;}
#srchWrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#srch{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 12px 7px 33px;outline:none;transition:border-color .15s;}
#srch:focus{border-color:var(--accent);}
#srch::placeholder{color:var(--muted);}
.livepill{display:flex;align-items:center;gap:5px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--live);font-size:10px;font-weight:700;letter-spacing:1.2px;padding:4px 9px;border-radius:20px;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* LAYOUT */
#layout{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:210px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#catList{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.secLabel{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 8px 4px;}
.catItem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--sub);transition:all .12s;border:1px solid transparent;white-space:nowrap;overflow:hidden;}
.catItem:hover{background:var(--s2);color:var(--text);}
.catItem.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.25);color:var(--accent2);}
.catIcon{font-size:14px;flex-shrink:0;}
.catCnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}

/* CONTENT */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* PLAYER */
#playerBar{flex-shrink:0;background:#000;border-bottom:1px solid var(--border);overflow:hidden;transition:height .32s cubic-bezier(.4,0,.2,1);position:relative;}
#playerBar.hidden{height:0;}
#playerBar.visible{height:min(40vw,290px);}
#vid{width:100%;height:100%;object-fit:contain;background:#000;display:block;}
#povl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:18px 14px 8px;display:flex;align-items:center;justify-content:space-between;opacity:0;transition:opacity .2s;}
#playerBar:hover #povl{opacity:1;}
#nowTxt{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
#xBtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
#xBtn:hover{background:rgba(255,255,255,.25);}

/* SOURCE BADGE */
#srcBadge{position:absolute;top:8px;left:10px;background:rgba(0,0,0,.65);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.5px;}

/* CHANNELS */
#chArea{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
#srcBar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.srcTag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.8px;color:var(--muted);background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:3px 7px;white-space:nowrap;}
.srcTag.ok{border-color:rgba(34,197,94,.3);color:var(--green);}
.srcTag.loading{border-color:rgba(59,130,246,.3);color:var(--accent2);}
.srcTag.fail{border-color:rgba(239,68,68,.3);color:var(--live);}
#countBar{font-size:11px;color:var(--muted);margin-left:auto;font-family:'JetBrains Mono',monospace;white-space:nowrap;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px;}
.chCard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .17s;position:relative;}
.chCard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(59,130,246,.18);}
.chCard.playing{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2),0 8px 20px rgba(96,165,250,.2);}
.thumb{aspect-ratio:16/9;background:var(--s2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.thumb img{width:62%;height:62%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.fb{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:6px;}
.liveTag{position:absolute;top:5px;right:5px;background:rgba(239,68,68,.88);color:#fff;font-size:8px;font-weight:700;letter-spacing:.8px;padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.playHov{position:absolute;inset:0;background:rgba(59,130,246,.62);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0;transition:opacity .17s;}
.chCard:hover .playHov{opacity:1;}
.chInfo{padding:7px 8px;}
.chName{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chGrp{font-size:9px;color:var(--muted);margin-top:2px;}

/* STATES */
.stateBox{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
.stateBox .ico{font-size:36px;}
.stateBox p{font-size:13px;text-align:center;}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:16px;}
#modal.open{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
.mhead{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhead h2{font-size:15px;font-weight:700;}
.mclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .12s;}
.mclose:hover{background:var(--border);color:var(--text);}
#msrch{margin:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;display:block;width:calc(100% - 24px);}
#msrch:focus{border-color:var(--accent);}
#msrch::placeholder{color:var(--muted);}
#cList{flex:1;overflow-y:auto;padding:4px 10px 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:grid;grid-template-columns:1fr 1fr;gap:3px;align-content:start;}
.coOpt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;transition:background .12s;border:1px solid transparent;}
.coOpt:hover{background:var(--s2);}
.coOpt.sel{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:var(--accent2);}
.coOpt .fl{font-size:17px;flex-shrink:0;}
.coOpt .cn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s1);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;z-index:900;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--green);color:var(--green);}
#toast.err{border-color:var(--live);color:var(--live);}

/* MOBILE */
@media(max-width:600px){
  #sidebar{display:none;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));}
  #cList{grid-template-columns:1fr;}
  #playerBar.visible{height:min(54vw,230px);}
}
</style>
</head>

const COUNTRIES=CO.filter(x=>{if(seen.has(x.c))return false;seen.add(x.c);return true;}).sort((a,b)=>a.en.localeCompare(b.en));

// ═══════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════
const CATS=[
  {id:'all',icon:'📺',en:'All',pt:'Todos'},
  {id:'news',icon:'📰',en:'News',pt:'Notícias'},
  {id:'entertainment',icon:'🎬',en:'Entertainment',pt:'Entretenimento'},
  {id:'sport',icon:'⚽',en:'Sport',pt:'Desporto'},
  {id:'music',icon:'🎵',en:'Music',pt:'Música'},
  {id:'kids',icon:'🎠',en:'Kids',pt:'Infantil'},
  {id:'documentary',icon:'🎞️',en:'Documentary',pt:'Documentários'},
  {id:'cooking',icon:'🍳',en:'Cooking',pt:'Culinária'},
  {id:'religious',icon:'🕊️',en:'Religious',pt:'Religioso'},
  {id:'travel',icon:'✈️',en:'Travel',pt:'Viagens'},
  {id:'auto',icon:'🚗',en:'Auto',pt:'Automóvel'},
  {id:'science',icon:'🔬',en:'Science & Tech',pt:'Ciência & Tec'},
];

// ═══════════════════════════════════════════════
// SOURCES — múltiplas por país (invisível ao utilizador)
// ═══════════════════════════════════════════════
const PROXY='https://api.allorigins.win/raw?url=';
const PROXY2='https://corsproxy.io/?';

// Fontes globais (sem geo-lock ou geo-lock leve)
const GLOBAL_SOURCES=[
  {label:'Free-TV',url:'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8'},
  {label:'DistroTV',url:'https://www.apsattv.com/distro.m3u'},
  {label:'Xiaomi',url:'https://www.apsattv.com/xiaomi.m3u'},
  {label:'Rakuten UK',url:'https://www.apsattv.com/rakutentv-uk.m3u'},
  {label:'Romaxa',url:'https://romaxa55.github.io/world_ip_tv/index.m3u'},
];

// Fontes específicas por país code
const COUNTRY_EXTRA={
  'pt':[
    {label:'M3UPT',url:'https://raw.githubusercontent.com/LITUATUI/M3UPT/main/M3U/M3UPT.m3u'},
  ],
  'us':[
    {label:'Plex US',url:'https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/refs/heads/main/playlists/plex_all.m3u'},
    {label:'Samsung US',url:'https://www.apsattv.com/ssungusa.m3u'},
    {label:'LG US',url:'https://www.apsattv.com/lg.m3u'},
    {label:'Redbox',url:'https://www.apsattv.com/redbox.m3u'},
  ],
  'gb':[
    {label:'Rakuten FR',url:'https://www.apsattv.com/rakutentv-fr.m3u'},
    {label:'Samsung UK',url:'https://www.apsattv.com/ssunguk.m3u'},
  ],
  'fr':[
    {label:'Rakuten FR',url:'https://www.apsattv.com/rakutentv-fr.m3u'},
    {label:'Samsung FR',url:'https://www.apsattv.com/ssungfr.m3u'},
  ],
  'de':[
    {label:'Samsung DE',url:'https://www.apsattv.com/ssungde.m3u'},
  ],
  'it':[
    {label:'Samsung IT',url:'https://www.apsattv.com/ssungit.m3u'},
  ],
  'es':[
    {label:'Samsung ES',url:'https://www.apsattv.com/ssunges.m3u'},
  ],
  'br':[
    {label:'Samsung BR',url:'https://www.apsattv.com/ssungbr.m3u'},
  ],
};

function getSourcesForCountry(code){
  const base=[{label:'IPTV-org',url:`https://iptv-org.github.io/iptv/countries/${code}.m3u`}];
  const extra=COUNTRY_EXTRA[code]||[];
  // Always add global no-geolock sources
  const globals=GLOBAL_SOURCES;
  return [...base,...extra,...globals];
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let CUR=null;
let LANG='pt';
let ALL=[];
let FILT=[];
let ACTIVE_CAT='all';
let SQ='';
let PLAYING=-1;
let HLS_I=null;
let TOAST_T=null;
let SRC_STATUS={};

// ═══════════════════════════════════════════════
// LANG
// ═══════════════════════════════════════════════
function detectLang(){
  const l=(navigator.language||'en').toLowerCase();
  LANG=l.startsWith('pt')||l.startsWith('gl')?'pt':'en';
}
function t(o){return LANG==='pt'?o.pt:o.en;}
function cl(co){return LANG==='pt'?co.pt:co.en;}

// ═══════════════════════════════════════════════
// DETECT COUNTRY
// ═══════════════════════════════════════════════
function detectCountry(){
  const l=(navigator.language||'en').toLowerCase();
  const map={'pt-pt':'pt','pt-br':'br','pt':'pt','es-es':'es','es-419':'mx','es':'es',
    'fr':'fr','de':'de','it':'it','en-gb':'gb','en-us':'us','en-au':'au','en-ca':'ca',
    'nl':'nl','pl':'pl','ru':'ru','tr':'tr','ar':'sa','zh':'cn','ja':'jp','ko':'kr','hi':'in'};
  let guess='us';
  for(const [k,v] of Object.entries(map)){if(l.startsWith(k)){guess=v;break;}}
  fetch('https://ipapi.co/json/')
    .then(r=>r.json())
    .then(d=>setCountry((d.country_code||guess).toLowerCase(),true))
    .catch(()=>setCountry(guess,true));
}

function setCountry(code,load){
  const found=COUNTRIES.find(x=>x.c===code)||COUNTRIES.find(x=>x.c==='us');
  CUR=found;
  document.getElementById('cflag').textContent=found.f;
  document.getElementById('cname').textContent=cl(found);
  if(load)loadCountry();
}

// ═══════════════════════════════════════════════
// LOAD — múltiplas fontes em paralelo
// ═══════════════════════════════════════════════
function loadCountry(){
  ALL=[];FILT=[];ACTIVE_CAT='all';SQ='';
  document.getElementById('srch').value='';
  SRC_STATUS={};
  closePl();
  closeModal();
  showLoading();
  updateSrcBar();
  renderCats([]);

  const sources=getSourcesForCountry(CUR.c);
  sources.forEach(s=>{SRC_STATUS[s.label]='loading';});
  updateSrcBar();

  const merged=new Map();

  const fetches=sources.map(src=>
    fetchM3U(src.url)
      .then(chs=>{
        SRC_STATUS[src.label]='ok';
        updateSrcBar();
        for(const ch of chs){
          const key=ch.name.toLowerCase().trim();
          if(!merged.has(key)){merged.set(key,{...ch,_src:src.label});}
        }
        // Render progressively as each source arrives
        ALL=[...merged.values()];
        applyFilter();
        renderCats(ALL);
      })
      .catch(()=>{
        SRC_STATUS[src.label]='fail';
        updateSrcBar();
      })
  );

  Promise.allSettled(fetches).then(()=>{
    ALL=[...merged.values()];
    applyFilter();
    renderCats(ALL);
    const n=ALL.length;
    toast(`${CUR.f} ${cl(CUR)} — ${n} canais`,n>0?'ok':'err');
  });
}

function fetchM3U(rawUrl){
  // Try proxy 1 then proxy 2
  return fetch(PROXY+encodeURIComponent(rawUrl))
    .then(r=>{if(!r.ok)throw new Error();return r.text();})
    .catch(()=>fetch(PROXY2+encodeURIComponent(rawUrl)).then(r=>r.text()))
    .then(parseM3U);
}

function parseM3U(txt){
  const lines=txt.split('\n');
  const out=[];let cur=null;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(line.startsWith('#EXTINF')){
      cur={name:'',group:'',logo:'',url:''};
      const nm=line.match(/,(.+)$/);if(nm)cur.name=nm[1].trim();
      const gm=line.match(/group-title="([^"]*)"/i);if(gm)cur.group=gm[1].trim();
      const lm=line.match(/tvg-logo="([^"]*)"/i);if(lm)cur.logo=lm[1].trim();
    }else if(/^https?:\/\//i.test(line)&&cur){
      cur.url=line;
      if(cur.name&&cur.url)out.push(cur);
      cur=null;
    }
  }
  return out;
}

// ═══════════════════════════════════════════════
// CATEGORY MATCH
// ═══════════════════════════════════════════════
function matchCat(ch,id){
  if(id==='all')return true;
  const g=(ch.group||'').toLowerCase();
  const n=(ch.name||'').toLowerCase();
  const has=s=>g.includes(s)||n.includes(s);
  switch(id){
    case 'news': return has('news')||has('noticias')||has('notícias')||has('info')||has('actualit')||has('nachrichten')||has('nouvelles');
    case 'sport': return has('sport')||has('deport')||has('esport')||has('desport')||has('futebol')||has('football')||has('soccer')||has('tennis')||has('basket')||has('rugby')||has('cricket')||has('f1')||has('racing');
    case 'kids': return has('kid')||has('child')||has('infant')||has('junior')||has('cartoon')||has('nickelodeon')||has('disney')||has('baby')||has('toon');
    case 'music': return has('music')||has('música')||has('musica')||has('mtv')||has('hits')||has('radio')||has('folk');
    case 'documentary': return has('doc')||has('natur')||has('discovery')||has('history')||has('national geo')||has('science');
    case 'religious': return has('religi')||has('faith')||has('church')||has('catol')||has('islam')||has('gospel')||has('christian')||has('tv mana')||has('record');
    case 'entertainment': return has('entertain')||has('general')||has('variedade')||has('comedy')||has('variety')||has('lifestyle')||g==='';
    case 'cooking': return has('cook')||has('food')||has('culin')||has('gastro')||has('chef');
    case 'travel': return has('travel')||has('viagem')||has('tourism')||has('explore')||has('adventure');
    case 'auto': return has('auto')||has('car')||has('motor')||has('speed')||has('race');
    case 'science': return has('science')||has('tech')||has('ciência')||has('nasa')||has('space')||has('engineering');
    default: return false;
  }
}

// ═══════════════════════════════════════════════
// FILTER & RENDER
// ═══════════════════════════════════════════════
function applyFilter(){
  let ch=[...ALL];
  if(ACTIVE_CAT!=='all')ch=ch.filter(c=>matchCat(c,ACTIVE_CAT));
  if(SQ){const q=SQ.toLowerCase();ch=ch.filter(c=>c.name.toLowerCase().includes(q)||(c.group||'').toLowerCase().includes(q));}
  FILT=ch;
  renderGrid();
}

function onSearch(){SQ=document.getElementById('srch').value;applyFilter();}

function showLoading(){
  document.getElementById('grid').innerHTML=`<div class="stateBox"><div class="spin"></div><p>${LANG==='pt'?'A carregar canais...':'Loading channels...'}</p></div>`;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  if(!FILT.length){
    grid.innerHTML=`<div class="stateBox"><div class="ico">📭</div><p>${LANG==='pt'?'Sem canais encontrados':'No channels found'}</p></div>`;
    return;
  }
  grid.innerHTML=FILT.map(ch=>{
    const idx=ALL.indexOf(ch);
    const pl=idx===PLAYING;
    const logo=ch.logo
      ?`<img src="${esc(ch.logo)}" alt="${esc(ch.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="fb" style="display:none">${esc(ch.name)}</div>`
      :`<div class="fb">${esc(ch.name)}</div>`;
    return `<div class="chCard${pl?' playing':''}" onclick="play(${idx})">
      <div class="thumb">${logo}<div class="liveTag">LIVE</div><div class="playHov">▶</div></div>
      <div class="chInfo"><div class="chName">${esc(ch.name)}</div><div class="chGrp">${esc(ch.group||'')}</div></div>
    </div>`;
  }).join('');
}

function renderCats(channels){
  const cnt={};
  for(const ch of channels){
    for(const cat of CATS){
      if(cat.id==='all')continue;
      if(matchCat(ch,cat.id))cnt[cat.id]=(cnt[cat.id]||0)+1;
    }
  }
  document.getElementById('catList').innerHTML=CATS
    .filter(cat=>cat.id==='all'||(cnt[cat.id]||0)>0)
    .map(cat=>`<div class="catItem${ACTIVE_CAT===cat.id?' active':''}" onclick="setCat('${cat.id}')">
      <span class="catIcon">${cat.icon}</span><span>${t(cat)}</span>
      <span class="catCnt">${cat.id==='all'?channels.length:(cnt[cat.id]||'')}</span>
    </div>`).join('');
}

function setCat(id){ACTIVE_CAT=id;renderCats(ALL);applyFilter();}

function updateSrcBar(){
  const bar=document.getElementById('srcBar');
  const total=ALL.length;
  bar.innerHTML=Object.entries(SRC_STATUS).map(([l,s])=>
    `<span class="srcTag ${s}">${l}</span>`
  ).join('')+`<span id="countBar" style="margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;">${total?total+' ch':''}</span>`;
}

// ═══════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════
function play(idx){
  const ch=ALL[idx];if(!ch)return;
  PLAYING=idx;
  document.getElementById('nowN').textContent=ch.name;
  document.getElementById('srcBadge').textContent=(ch._src||'').toUpperCase();
  const bar=document.getElementById('playerBar');
  bar.classList.remove('hidden');bar.classList.add('visible');
  const vid=document.getElementById('vid');
  if(HLS_I){HLS_I.destroy();HLS_I=null;}
  vid.src='';

  if(window.Hls&&Hls.isSupported()){
    HLS_I=new Hls({enableWorker:true,lowLatencyMode:true,maxBufferLength:20,xhrSetup:(xhr,url)=>{xhr.open('GET',url,true);}});
    HLS_I.loadSource(ch.url);
    HLS_I.attachMedia(vid);
    HLS_I.on(Hls.Events.MANIFEST_PARSED,()=>vid.play().catch(()=>{}));
    HLS_I.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)toast(LANG==='pt'?'Stream indisponível':'Stream unavailable','err');});
  }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=ch.url;vid.play().catch(()=>{});
  }else{
    vid.src=ch.url;vid.play().catch(()=>{});
  }
  renderGrid();
}

function closePl(){
  if(HLS_I){HLS_I.destroy();HLS_I=null;}
  const vid=document.getElementById('vid');
  vid.pause();vid.src='';
  const bar=document.getElementById('playerBar');
  bar.classList.remove('visible');bar.classList.add('hidden');
  PLAYING=-1;renderGrid();
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
let MF='';
function openModal(){MF='';document.getElementById('msrch').value='';document.getElementById('modal').classList.add('open');renderCoList();setTimeout(()=>document.getElementById('msrch').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function filterCo(){MF=document.getElementById('msrch').value.toLowerCase();renderCoList();}
function renderCoList(){
  const list=COUNTRIES.filter(c=>!MF||c.en.toLowerCase().includes(MF)||c.pt.toLowerCase().includes(MF)||c.c.includes(MF));
  document.getElementById('cList').innerHTML=list.map(co=>
    `<div class="coOpt${CUR&&CUR.c===co.c?' sel':''}" onclick="selectCo('${co.c}')">
      <span class="fl">${co.f}</span><span class="cn">${cl(co)}</span>
    </div>`).join('');
}
function selectCo(code){setCountry(code,false);loadCountry();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+type;
  clearTimeout(TOAST_T);TOAST_T=setTimeout(()=>el.classList.remove('show'),3200);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(function init(){
  detectLang();
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js';
  s.onload=()=>detectCountry();
  s.onerror=()=>detectCountry();
  document.head.appendChild(s);
})();
</script>
